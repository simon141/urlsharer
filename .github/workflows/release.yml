name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write   # required for softprops/action-gh-release to publish

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Derive version from tag
        id: version
        run: |
          # Tag looks like v1.2.3 -> versionName "1.2.3"
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NAME"
          MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}
          # Monotonic integer: allows minor/patch up to 99 each.
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          # Fallback for non-semver tags: use UTC build date (YYYYMMDD).
          if [ "$VERSION_CODE" -eq 0 ]; then
            VERSION_CODE=$(date -u +%Y%m%d)
          fi
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Building versionName=$VERSION_NAME versionCode=$VERSION_CODE"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/app-release.apk \
            "release-artifacts/urlsharer-${GITHUB_REF_NAME}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/urlsharer-${{ github.ref_name }}.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
